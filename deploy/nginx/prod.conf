# MXID — nginx prod config
#
# Topology:
#
#   nginx pod     — TLS terminate, gzip, sendfile, etag, serves SPA static
#                   files mounted as volumes; reverse-proxies API + protocol
#                   to the backend pod.
#   backend pod   — Go binary, plain HTTP on :8080, no static files.
#
# Static layout (baked into the web image):
#   /var/www/mxid/         ← portal build output  (served at /)
#   /var/www/mxid/admin/   ← console build output (served at /admin/)
#   /etc/nginx/cert/       ← TLS cert + key (mounted)
#
# Routing matches dev.conf so the same URL scheme works in both envs:
#
#   /admin/...        → console SPA (with SPA fallback)
#   /api/v1/...       → backend
#   /protocol/...     → backend (OIDC/SAML/CAS)
#   /static/...       → backend
#   /health           → backend
#   /...              → portal SPA (with SPA fallback)

upstream mxid_backend {
    # Backend service address. In docker compose this is the service name on
    # the prod port (8080); in Kubernetes, the Service DNS.
    server mxid:8080;
}

# Lift WebSocket upgrade once so any location can reuse it.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Mute access logs for health-check probes — the GKE load balancer (User-Agent
# "GoogleHC/1.x") and Kubernetes liveness/readiness probes ("kube-probe/1.x")
# hammer "/" every few seconds and otherwise drown the real request logs.
# $mxid_log = 0 → the access_log `if=` skips the line; everything else logs.
map $http_user_agent $mxid_log {
    default          1;
    "~*^GoogleHC"    0;
    "~*^kube-probe"  0;
}

# ---- HTTP → HTTPS redirect ----
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Skip health-check probe lines (k8s hits "/" on :80). Same log target as the
    # image default (symlinked to stdout), just gated by the probe map.
    access_log /var/log/nginx/access.log main if=$mxid_log;

    # Let's Encrypt / acme.sh challenge — handle this BEFORE the redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ${SERVER_NAME};

    ssl_certificate     /etc/nginx/cert/${CERT_FILE};
    ssl_certificate_key /etc/nginx/cert/${KEY_FILE};
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Skip health-check probe lines (GoogleHC LB check / kube-probe) — see the
    # $mxid_log map above.
    access_log /var/log/nginx/access.log main if=$mxid_log;

    # Static root. Portal SPA lives here; console SPA under ./admin/ so its
    # /admin/ URL prefix maps 1:1 onto the filesystem (no alias — alias + regex
    # locations is a known footgun that breaks asset paths).
    root /var/www/mxid;

    # ---- Security headers ----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    # CSP intentionally relaxed for the SPA; tighten per-site.
    # add_header Content-Security-Policy  "default-src 'self'; ..."  always;

    client_max_body_size 50m;

    # ---- gzip ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        application/javascript
        application/json
        application/xml
        text/css
        text/javascript
        text/plain
        text/xml
        image/svg+xml;

    # ---- Common proxy headers ----
    proxy_set_header Host              $http_host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID      $request_id;

    # ---- Backend REST ----
    location /api/      { proxy_pass http://mxid_backend; }
    location /protocol/ {
        proxy_pass         http://mxid_backend;
        proxy_http_version 1.1;
        # Re-declare server-level headers: nginx drops ALL inherited
        # proxy_set_header the moment ANY proxy_set_header is set inside a
        # location block. Without these the backend sees Host=upstream and
        # X-Forwarded-Proto goes missing, so the OIDC issuer scheme mismatches
        # and discovery/authorize is rejected with 403.
        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Request-ID      $request_id;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
    }
    location /static/   { proxy_pass http://mxid_backend; }
    location = /health  { proxy_pass http://mxid_backend; }
    location = /api/v1/system/bootstrap { proxy_pass http://mxid_backend; }
    location = /api/v1/system/info      { proxy_pass http://mxid_backend; }

    # ---- SPA entrypoints must NEVER be cached ----
    # The hashed /assets/*.js|css are immutable (cached 1y below), but index.html
    # is the one file that references them by their content-hashed names. If the
    # browser caches index.html, a new deploy's index (pointing at the new
    # bundle) is never fetched and the user is stuck on the old app until a hard
    # refresh. `no-cache` = always revalidate (ETag → 304 when unchanged), so a
    # deploy goes live on the next navigation with zero manual refresh.
    #
    # try_files' internal redirect to /index.html re-enters location matching,
    # so these exact-match blocks catch both the SPA fallback and direct hits.
    # A location-level add_header drops the server-level ones, so the security
    # headers are re-declared here.
    location = /index.html {
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    }
    location = /admin/index.html {
        add_header Cache-Control "no-cache" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "SAMEORIGIN" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    }

    # ---- Console SPA (files at {root}/admin/, served under /admin/) ----
    location /admin/ {
        # SPA fallback — React Router handles paths client-side.
        try_files $uri $uri/ /admin/index.html;
        # Hashed asset filenames → long cache. No root/alias: inherits the
        # server root, so /admin/assets/x.css → {root}/admin/assets/x.css.
        location ~* ^/admin/assets/.*\.(js|css|png|jpg|svg|woff2?|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
    location = /admin {
        return 301 /admin/;
    }

    # ---- Portal SPA (root catch-all) ----
    location / {
        try_files $uri $uri/ /index.html;
        # Hashed asset filenames → long cache.
        location ~* ^/assets/.*\.(js|css|png|jpg|svg|woff2?|ico)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
