apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mxid.fullname" . }}-web-nginx
  labels:
    {{- include "mxid.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
data:
  # This template is processed by the nginx docker-entrypoint envsubst mechanism.
  # It contains NO custom ${VAR} placeholders — only standard nginx variables
  # ($uri, $host, etc.) — so envsubst will pass them through unchanged.
  default.conf.template: |
    # Mute access logs for health-check probes — the GKE load balancer
    # (User-Agent "GoogleHC/1.x") and Kubernetes liveness/readiness probes
    # ("kube-probe/1.x") hit "/" every few seconds and otherwise drown the real
    # request logs. $mxid_log = 0 → the access_log `if=` skips the line.
    map $http_user_agent $mxid_log {
        default          1;
        "~*^GoogleHC"    0;
        "~*^kube-probe"  0;
    }

    server {
        listen 80;
        server_name _;

        # Skip health-check probe lines (see the $mxid_log map above); same log
        # target as the image default (symlinked to stdout), gated by the map.
        access_log /var/log/nginx/access.log main if=$mxid_log;

        root /var/www/mxid;
        index index.html;

        # Enable gzip compression
        gzip on;
        gzip_types text/plain text/css application/json application/javascript
                   text/xml application/xml application/xml+rss text/javascript
                   image/svg+xml;
        gzip_min_length 1024;

        # Security headers (TLS/HSTS is handled by the upstream Gateway)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # SPA entrypoints must NEVER be cached. The hashed /assets/*.js|css are
        # immutable (cached 1y below), but index.html references them by their
        # content-hashed names — a cached index.html points at a stale bundle,
        # so a new deploy is invisible until a hard refresh. `no-cache` = always
        # revalidate (ETag → 304 when unchanged). try_files' internal redirect to
        # /index.html re-enters location matching, so these exact-match blocks
        # catch both the SPA fallback and direct hits. A location-level add_header
        # drops the server-level ones, so the security headers are re-declared.
        location = /index.html {
            add_header Cache-Control "no-cache" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }
        location = /admin/index.html {
            add_header Cache-Control "no-cache" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        }

        # Admin console SPA — served under /admin/
        location /admin/ {
            try_files $uri $uri/ /admin/index.html;

            # Long-lived cache for hashed static assets
            location ~* ^/admin/assets/.*\.(js|css|png|jpg|svg|woff2?|ico)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }

        # Redirect bare /admin to /admin/ to keep the SPA router happy
        location = /admin {
            return 301 /admin/;
        }

        # Portal SPA — served at /
        location / {
            try_files $uri $uri/ /index.html;

            # Long-lived cache for hashed static assets
            location ~* ^/assets/.*\.(js|css|png|jpg|svg|woff2?|ico)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
