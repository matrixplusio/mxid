# MXID Helm Chart — default values
# Override these in your own values file or with --set flags.

# ---------------------------------------------------------------------------
# Edition: "ce" (Community Edition, AGPL-3.0) or "ee" (Enterprise Edition).
# Changing edition switches the backend image repository at upgrade time.
# ---------------------------------------------------------------------------
edition: ce

# ---------------------------------------------------------------------------
# Public hostname for the deployment. Drives routing rules AND — unless
# overridden in config.* below — the canonical external URLs (OIDC issuer /
# SAML EntityID / portal / console) and the CORS allow-list. MUST be your real
# externally-reachable HTTPS host; the release-mode boot check rejects localhost.
# Example: id.example.com
# ---------------------------------------------------------------------------
host: id.example.com

# ---------------------------------------------------------------------------
# Image settings
# ---------------------------------------------------------------------------
image:
  # Registry + namespace prefix for all images (backend CE/EE + web). Override
  # to pull from a private registry / Harbor; a mirror must keep the same repo
  # names (mxid, mxid-ee, mxid-web) under this prefix.
  # Example (Harbor): registry: harbor.yourco.com/mxid
  registry: "ghcr.io/imkerbos"
  # Default tag for BOTH backend and web images — keep them in lockstep unless
  # you have a reason not to (the backend migrates the DB on boot and the web
  # SPA is built against the backend's API, so mismatched versions can drift).
  tag: "v1.1.3"
  # Optional per-component overrides — pin one image independently of `tag`, e.g.
  # bump only the backend for a fix while leaving an unchanged web/SPA on its
  # existing tag (avoids a needless re-tag + re-push into your mirror). Empty =
  # use `tag` above. (backendTag covers the CE mxid OR the EE mxid-ee image,
  # per `edition`.)
  backendTag: ""
  webTag: ""
  pullPolicy: IfNotPresent

# Image pull secrets (list of secret names) — needed for private registries.
imagePullSecrets: []
# - name: regcred

# ---------------------------------------------------------------------------
# Backend (StatefulSet)
# ---------------------------------------------------------------------------
backend:
  # Number of replicas. Each pod gets a unique Snowflake nodeID derived from
  # its ordinal index (0, 1, 2, …), so nodeIDs are always unique across pods.
  # Default 2 for high availability: single-writer background jobs (audit
  # chainer/anchorer, OIDC key rotation, JIT sweeper) are leader-elected via a
  # Postgres advisory lock, and cross-pod caches invalidate over Redis pub/sub,
  # so >1 replica is safe and gives failover.
  replicaCount: 2

  # Graceful shutdown. On pod termination the kubelet sends SIGTERM while the
  # Service/mesh endpoint is still being removed (the two happen in parallel) —
  # preStopSleep delays SIGTERM by that many seconds so endpoint removal
  # propagates first, avoiding dropped requests on rolling updates / scale-down.
  # The backend then drains in-flight requests itself (10s). Set
  # terminationGracePeriodSeconds > preStopSleep + 10s. Set preStopSleep to 0
  # to disable the hook.
  preStopSleep: 5
  terminationGracePeriodSeconds: 40

  # Resource requests and limits for the backend container.
  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1000m"
      memory: "512Mi"

  # Init container that blocks pod startup until Postgres + Redis accept TCP
  # connections, so the main container doesn't crash-loop while deps come up.
  waitForDeps:
    enabled: true
    image: busybox:1.37
    resources:
      requests:
        cpu: "10m"
        memory: "16Mi"
      limits:
        cpu: "50m"
        memory: "32Mi"

  # Horizontal Pod Autoscaler — scales the StatefulSet.
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
    # targetMemoryUtilizationPercentage: 80

  # Extra annotations to add to the StatefulSet pods.
  podAnnotations: {}

  # Extra labels to add to the StatefulSet pods.
  podLabels: {}

  # Pod security context. Non-root by default — the backend is a static Go
  # binary listening on :8080 (an unprivileged port), so it needs no root and no
  # capabilities. If you run a custom image that must write outside /tmp or bind
  # a privileged port, relax these.
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault

  # Backend container security context.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Node selector, tolerations, and affinity.
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Web frontend (Deployment — stateless nginx + SPA)
# ---------------------------------------------------------------------------
web:
  # Default 2 for HA — the web tier is stateless nginx + static SPA, so
  # multiple replicas are always safe.
  replicaCount: 2

  # Graceful shutdown — same rationale as backend.preStopSleep above. nginx
  # serves short static requests, so a smaller grace period is fine.
  preStopSleep: 5
  terminationGracePeriodSeconds: 30

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

  podAnnotations: {}
  podLabels: {}
  # Left empty on purpose: the web image is stock nginx:1.27-alpine binding :80,
  # which needs root (or the nginx-unprivileged image + a high port). Don't set
  # runAsNonRoot here unless you switch to an unprivileged nginx image.
  podSecurityContext: {}
  securityContext: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

# ---------------------------------------------------------------------------
# Application configuration — non-sensitive env vars (go into a ConfigMap)
# ---------------------------------------------------------------------------
config:
  # Server mode: "release" for production, "debug" for development.
  serverMode: release

  # Comma-separated list of allowed CORS origins for the portal and console.
  # Blank → derived as "https://<host>". Override for split-domain / extra origins.
  allowedOrigins: ""

  # Trusted reverse-proxy / load-balancer CIDRs (list). Behind an internal LB or
  # ingress, set this to the edge proxy CIDR(s) so the app resolves the REAL
  # client IP from X-Forwarded-For instead of collapsing every intranet client
  # onto the LB IP — which otherwise breaks per-client audit / rate-limit /
  # conditional access. Empty → broad RFC1918 default (logs a release-mode warning).
  #   trustedProxies:
  #     - "10.0.0.0/8"
  #     - "35.191.0.0/16"     # e.g. GCP LB / health-check range
  trustedProxies: []

  # Canonical external URLs. These are the OIDC issuer (`iss`) / SAML EntityID
  # base / CAS root, plus the portal and console origins that third parties
  # (Lark and other IdPs/SPs) redirect back to. Blank → derived from `host`:
  #   issuerUrl  = https://<host>
  #   portalUrl  = https://<host>
  #   consoleUrl = https://<host>/admin
  # Set explicitly for split-domain deployments. MUST be externally-reachable
  # HTTPS in release mode (localhost is rejected at boot).
  issuerUrl: ""
  portalUrl: ""
  consoleUrl: ""

# ---------------------------------------------------------------------------
# Database (external — use RDS / CloudSQL / managed PostgreSQL in production)
# ---------------------------------------------------------------------------
database:
  host: "postgres"          # hostname or IP of the PostgreSQL server
  port: "5432"
  name: "mxid"
  user: "mxid"
  # password: see secrets section below

# ---------------------------------------------------------------------------
# Redis (external — use ElastiCache / MemoryStore / managed Redis in production)
# ---------------------------------------------------------------------------
redis:
  host: "redis"             # hostname or IP of the Redis server
  port: "6379"
  # password: see secrets section below

# ---------------------------------------------------------------------------
# Secrets
#
# Option A (create: true): the chart creates a Secret from the values below.
#   IMPORTANT: never commit real secrets into values files tracked by git.
#   Use --set, sealed-secrets, external-secrets-operator, or Vault instead.
#
# Option B (create: false): provide an existing Secret name via existingSecret.
#   The Secret must contain these keys:
#     MXID_DATABASE_PASSWORD
#     MXID_REDIS_PASSWORD
#     MXID_CRYPTO_KEY_ENCRYPTION_KEY
# ---------------------------------------------------------------------------
secrets:
  create: true

  # When create: true, annotate the generated Secret with
  # helm.sh/resource-policy: keep so `helm uninstall` does NOT delete it —
  # protecting the irreplaceable KEK + audit-chain key from an accidental or
  # temporary uninstall.
  keepOnUninstall: true

  # When create: true, make the Secret idempotent: if it already exists in the
  # cluster, reuse its current per-key values instead of overwriting them from
  # these values. So a repeat install/upgrade — including after an
  # uninstall that kept the Secret — never clobbers the existing KEK /
  # audit-chain key, no matter what these values say. First install (Secret
  # absent) uses the values below. Set false to force these values to win
  # (e.g. to deliberately rotate a password).
  preserveExisting: true

  # Reference to a pre-existing Secret (used when create: false).
  existingSecret: ""

  # MUST set — database password.
  databasePassword: ""

  # MUST set — Redis password (leave empty if Redis has no auth).
  redisPassword: ""

  # MUST set — 32-byte AES-256 master key encryption key (KEK).
  # Generate with: openssl rand -base64 32
  cryptoKeyEncryptionKey: ""

  # MUST set — tamper-proof audit hash-chain HMAC key (base64 of 32 random bytes).
  # Generate with: openssl rand -base64 32
  auditChainKey: ""

  # Required when audit.anchorSink.enabled — Ed25519 seed (base64 of 32 bytes)
  # that signs the external Merkle anchors. Generate with: openssl rand -base64 32
  auditAnchorKey: ""

# ---------------------------------------------------------------------------
# Audit anchor sink
#
# The anchorer (a single leader-elected replica) seals the audit hash-chain
# tail into signed Merkle anchors and appends them to an external sink. On K8s
# the pod filesystem is ephemeral, so the sink is backed by a per-pod
# PersistentVolume. NOTE: only the leader replica writes anchors, so sink files
# are distributed across the replicas' PVCs over the lifetime of the deployment
# (a leadership move writes to a different ordinal's PVC). Offline verification
# must aggregate the sink files from every replica's PVC. A shared object-store
# sink (S3 with Object Lock) is the durable alternative and is future work.
# ---------------------------------------------------------------------------
audit:
  anchorSink:
    enabled: true
    # File the signed anchors are appended to (must live under the mount path).
    path: /app/data/audit-anchors.log
    # Mount point for the anchor-sink PersistentVolume.
    mountPath: /app/data
    persistence:
      size: 1Gi
      # Empty => cluster default StorageClass.
      storageClass: ""

# ---------------------------------------------------------------------------
# Ingress / routing
#
# type: istio       — Istio VirtualService (networking.istio.io/v1beta1)
#       gatewayapi  — Gateway API HTTPRoute (gateway.networking.k8s.io/v1)
#       ingress     — Standard Kubernetes Ingress
#       none        — No ingress resource created
# ---------------------------------------------------------------------------
routing:
  # Default gatewayapi — HTTPRoute against an existing Gateway (see gatewayapi
  # block below). Switch to istio / ingress / none as your cluster requires.
  type: gatewayapi

  # --- Istio settings (used when type=istio) ---
  istio:
    # Reference to the existing Istio Gateway.
    # May include a namespace prefix, e.g. "istio-system/mxid-gateway".
    gateway: "istio-system/mxid-gateway"

  # --- Gateway API settings (used when type=gatewayapi) ---
  gatewayapi:
    # Name of the existing Gateway resource.
    name: "mxid-gateway"
    # Namespace of the Gateway (leave empty for same namespace as the chart).
    namespace: ""
    # Optional sectionName if the Gateway has multiple listeners.
    sectionName: ""

  # --- GKE-specific: backend health check (used on GKE Gateway API) ---
  # GKE provisions a Google Cloud LB behind the Gateway; its backend health
  # check defaults to probing "/", which the backend does not serve → 404 →
  # the backend is marked UNHEALTHY and the LB stops routing to it. Enable this
  # on GKE to emit a HealthCheckPolicy that points the check at /health.
  # No-op on non-GKE clusters (the CRD networking.gke.io/v1 won't exist there,
  # so keep it disabled unless you're on GKE).
  gke:
    healthCheck:
      enabled: false
      path: /health

  # --- Standard Ingress settings (used when type=ingress) ---
  ingress:
    className: ""
    annotations: {}
    # Example annotations:
    #   nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    #   cert-manager.io/cluster-issuer: "letsencrypt-prod"   # auto-issue + renew TLS
    tls:
      # Enable HTTPS. With cert-manager (annotation above) the named secret is
      # created + renewed automatically; otherwise create it yourself:
      #   kubectl create secret tls mxid-tls --cert=fullchain.pem --key=privkey.pem
      enabled: false
      secretName: "mxid-tls"
