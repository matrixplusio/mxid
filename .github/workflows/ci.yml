name: CI

# Quality gate for every push + PR to dev/main. Until this existed the ONLY
# gates were local (pre-commit, skippable via SKIP_VERIFY) — so regressions
# could merge unchecked. This runs the same `make verify` chain + the test
# suite in the cloud, on every change, so a red check blocks the merge.
on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    name: Go (build · vet · lint · gormtaglint · test · vuln)
    runs-on: ubuntu-latest

    # Postgres so the tests exercise the PG-specific machinery (tenant plugin,
    # SKIP LOCKED, advisory locks, ltree <@, pg_trgm, FK cascades, audit
    # hash-chain) that SQLite can't model. Redis-backed tests use miniredis
    # in-process, so no Redis service is needed.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mxid
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.12' # keep in lockstep with go.mod + the CE Dockerfile
          cache: true

      - name: Download modules
        run: go mod download

      - name: verify-mod (go.mod/go.sum in sync)
        run: make verify-mod

      - name: vet
        run: go vet ./...

      - name: build (all packages)
        run: go build ./...

      - name: gormtaglint (garble-safe scan structs)
        run: make verify-gormtags

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # goinstall builds golangci-lint with the setup-go toolchain (1.25.12);
          # the prebuilt v1.64.8 binary is compiled with go1.24 and refuses to
          # analyze a go 1.25 module ("language version used to build golangci-lint
          # is lower than the targeted Go version"). Pin the last v1 (the repo's
          # .golangci.yml is v1 config) and let it build under 1.25.
          version: v1.64.8
          install-mode: goinstall
          args: --timeout=5m

      - name: Apply migrations (seeds role 1 + admin so the e2e tests have FKs)
        run: |
          go install -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest
          migrate -path migrations -database "postgres://postgres:postgres@localhost:5432/mxid?sslmode=disable" up

      - name: test (race + Postgres e2e)
        env:
          # e2e tests read this (glebarez KV DSN form); when unset they skip.
          MXID_E2E_DSN: "host=localhost port=5432 user=postgres password=postgres dbname=mxid sslmode=disable"
        run: go test -race ./...

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  frontend:
    name: Web (build · exports)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          # pnpm 10+: overrides live in pnpm-workspace.yaml (the @babel/core
          # security pin). pnpm 9 doesn't read overrides from there, so a frozen
          # install sees a config that mismatches the lockfile's overrides
          # snapshot and fails (ERR_PNPM_LOCKFILE_CONFIG_MISMATCH).
          version: 10

      - name: verify-exports (package.json exports map exists on disk)
        run: node scripts/verify-exports.mjs

      - name: build web (strict)
        working-directory: web
        run: |
          pnpm install --frozen-lockfile
          pnpm -r build
